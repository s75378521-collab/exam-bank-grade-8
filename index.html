  <style>
    :root {
      --bg-1: #08111f;
      --bg-2: #11182b;
      --bg-3: #1c2b4a;
      --card: rgba(255, 255, 255, 0.08);
      --card-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.12);
      --text-soft: rgba(226, 232, 240, 0.8);
      --blue: #6aa7ff;
      --mint: #7cf0c2;
      --rose: #ff8db5;
      --gold: #ffd166;
      --accent-start: #60a5fa;
      --accent-end: #7cf0c2;
      --surface-blur: 18px;
      --surface-shadow: 0 14px 50px rgba(0, 0, 0, 0.28);
      --surface-shadow-strong: 0 18px 60px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(106, 167, 255, 0.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(124, 240, 194, 0.12), transparent 20%),
        radial-gradient(circle at bottom right, rgba(255, 141, 181, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    h1, h2, h3, h4, .display-font {
      font-family: "Space Grotesk", sans-serif;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(var(--surface-blur));
      border: 1px solid var(--border);
      box-shadow: var(--surface-shadow);
    }

    .glass-strong {
      background: var(--card-strong);
      backdrop-filter: blur(var(--surface-blur));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: var(--surface-shadow-strong);
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end), #ffb1cb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .soft-text {
      color: var(--text-soft);
    }

    .panel-enter {
      animation: panelEnter 0.35s ease;
    }

    .card-hover {
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.26);
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
    }

    .question-option input {
      accent-color: #60a5fa;
    }

    .question-option.correct {
      border-color: rgba(124, 240, 194, 0.8);
      background: rgba(124, 240, 194, 0.12);
    }

    .question-option.wrong {
      border-color: rgba(255, 141, 181, 0.8);
      background: rgba(255, 141, 181, 0.12);
    }

    .question-option.selected {
      border-color: rgba(106, 167, 255, 0.7);
      background: rgba(106, 167, 255, 0.1);
    }

    .floating-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
      opacity: 0.22;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 50;
      min-width: 240px;
      max-width: 360px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .progress-bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
      transition: width 0.35s ease;
    }

    .drawer-overlay,
    .quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(2, 6, 23, 0.58);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .drawer-overlay.open,
    .quiz-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .app-drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 70;
      width: min(24rem, calc(100vw - 2rem));
      padding: 1rem;
      transform: translateX(-105%);
      transition: transform 0.4s ease;
    }

    .app-drawer.open {
      transform: translateX(0);
    }

    .settings-panel {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-8px);
      transition: max-height 0.35s ease, opacity 0.3s ease, transform 0.3s ease, margin-top 0.3s ease;
    }

    .settings-panel.open {
      max-height: 900px;
      opacity: 1;
      transform: translateY(0);
      margin-top: 1rem;
    }

    .theme-chip.active {
      border-color: rgba(255, 255, 255, 0.45);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.16) inset;
    }

    .profile-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(96, 165, 250, 0.5);
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-weight: 700;
      font-size: 14px;
      margin: 0;
    }

    .profile-email {
      font-size: 12px;
      color: var(--text-soft);
      margin: 4px 0 0 0;
    }

    .google-btn {
      background: white;
      color: #3c4043;
      border: none;
      border-radius: 4px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .google-btn:hover {
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
    }

    @keyframes panelEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(40px, -30px, 0) scale(1.14);
      }
    }

    @media (max-width: 1024px) {
      .floating-orb {
        display: none;
      }
    }
  </style>
</head>

    // ============ GOOGLE SIGN-IN HANDLER ============
    function onSignIn(response) {
      if (response.credential) {
        const payload = parseJwt(response.credential);
        const user = {
          name: payload.name,
          email: payload.email,
          picture: payload.picture
        };
        localStorage.setItem(storageKeys.user, JSON.stringify(user));
        updateProfile(user);
        showToast(`Welcome, ${user.name}!`);
      }
    }

    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(jsonPayload);
    }

    function updateProfile(user) {
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileAvatar').src = user.picture;
      document.getElementById('googleSignInContainer').style.display = 'none';
      document.getElementById('signOutBtn').style.display = 'block';
    }

    function handleSignOut() {
      localStorage.removeItem(storageKeys.user);
      document.getElementById('profileName').textContent = 'Guest';
      document.getElementById('profileEmail').textContent = 'Not signed in';
      document.getElementById('profileAvatar').src = 'https://ui-avatars.com/api/?name=Guest&background=111827&color=fff';
      document.getElementById('googleSignInContainer').style.display = 'block';
      document.getElementById('signOutBtn').style.display = 'none';
      google.accounts.id.renderButton(document.getElementById('googleSignInContainer'), { theme: 'filled_black', size: 'large' });
      showToast('Signed out successfully');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ============ RENDER QUIZZES ============
    function renderQuizzes() {
      const sidebar = document.getElementById('sidebarUnits');
      const subjects = {};
      
      Object.entries(quizzes).forEach(([key, quiz]) => {
        if (!subjects[quiz.subject]) {
          subjects[quiz.subject] = [];
        }
        subjects[quiz.subject].push({ key, ...quiz });
      });

      Object.entries(subjects).forEach(([subject, quizList]) => {
        const html = `
          <div class="rounded-2xl border border-white/10 bg-white/5 p-3">
            <p class="text-xs font-bold uppercase tracking-[0.15em] text-slate-300">${subject}</p>
            <div class="mt-2 space-y-2">
              ${quizList.map(q => `
                <button class="quiz-btn w-full text-left rounded-lg bg-white/5 px-3 py-2 text-sm hover:bg-white/10 transition" data-quiz="${q.key}">
                  ${q.icon} ${q.title}
                </button>
              `).join('')}
            </div>
          </div>
        `;
        sidebar.insertAdjacentHTML('beforeend', html);
      });

      document.querySelectorAll('.quiz-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const quizKey = e.target.closest('button').dataset.quiz;
          startQuiz(quizKey);
        });
      });
    }

    function startQuiz(quizKey) {
      showToast(`Starting ${quizzes[quizKey].title}...`);
      // Quiz logic here (expand as needed)
    }

    // ============ INIT ============
    window.addEventListener('load', () => {
      const user = localStorage.getItem(storageKeys.user);
      if (user) {
        updateProfile(JSON.parse(user));
      } else {
        google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onSignIn });
        google.accounts.id.renderButton(document.getElementById('googleSignInContainer'), { theme: 'filled_black', size: 'large' });
      }

      document.getElementById('signOutBtn').addEventListener('click', handleSignOut);
      document.getElementById('openDrawerBtn').addEventListener('click', () => {
        document.getElementById('drawerOverlay').classList.add('open');
        document.getElementById('appDrawer').classList.add('open');
      });
      document.getElementById('closeDrawerBtn').addEventListener('click', () => {
        document.getElementById('drawerOverlay').classList.remove('open');
        document.getElementById('appDrawer').classList.remove('open');
      });
      document.getElementById('openSettingsBtn').addEventListener('click', () => {
        document.getElementById('settingsPanel').classList.toggle('open');
      });
      document.getElementById('drawerOverlay').addEventListener('click', () => {
        document.getElementById('drawerOverlay').classList.remove('open');
        document.getElementById('appDrawer').classList.remove('open');
      });

      renderQuizzes();
      showToast('Exam Bank Portal X is ready! 🎉');
    });
